<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolVerse - Video Downloader Test</title>
  <style>
    :root {
      --bg-main: #0a0a0a;
      --bg-card: #111111;
      --bg-input: #1a1a1a;
      --primary: #8b5cf6;
      --accent: #FFD700;
      --text-main: #ffffff;
      --text-muted: #888888;
      --border: #222222;
      --success: #10b981;
      --error: #ef4444;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    
    body {
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
    }
    
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header p { color: var(--text-muted); font-size: 1.1rem; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--primary);
    }

    input {
      width: 100%;
      padding: 15px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 16px;
      margin-bottom: 15px;
      outline: none;
    }
    
    input:focus { border-color: var(--primary); }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #6d28d9);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .result-area {
      margin-top: 20px;
      padding: 20px;
      background: var(--bg-input);
      border-left: 4px solid var(--primary);
      border-radius: 10px;
      display: none;
    }

    .loading {
      border: 3px solid var(--border);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .back-link {
      display: inline-block;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 20px;
      cursor: pointer;
    }
    
    .back-link:hover { color: var(--primary); }

    /* Video Info Card */
    .video-info {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .video-thumbnail {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      margin: 0 auto 20px;
      display: block;      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .video-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--text-main);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .video-meta {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .platform-youtube { background: #FF0000; color: #fff; }
    .platform-tiktok { background: #000000; color: #fff; border: 1px solid #fff; }
    .platform-facebook { background: #1877F2; color: #fff; }
    .platform-instagram { background: linear-gradient(135deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); color: #fff; }
    .platform-generic { background: var(--primary); color: #fff; }

    .download-section {
      margin-top: 20px;
    }

    .download-section h3 {
      color: var(--accent);
      margin-bottom: 15px;      font-size: 1.1rem;
    }

    .download-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
    }

    .download-option {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }

    .download-option:hover {
      border-color: var(--primary);
      transform: translateX(5px);
    }

    .download-info {
      flex: 1;
    }

    .download-quality {
      color: var(--accent);
      font-weight: bold;
      font-size: 0.95rem;
      margin-bottom: 5px;
    }

    .download-format {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
    }

    .btn-download {
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.9rem;      white-space: nowrap;
      margin-left: 10px;
    }

    .btn-download:hover {
      background: #6d28d9;
    }

    .btn-audio {
      background: var(--success);
    }

    .btn-audio:hover {
      background: #059669;
    }
  </style>
</head>
<body>

  <div class="container">
    <a class="back-link" onclick="window.history.back()">← Back</a>
    
    <div class="header">
      <h1>📥 Video Downloader</h1>
      <p>Download videos from any platform instantly</p>
    </div>

    <div class="card">
      <div class="section-title">🔗 Paste Video URL</div>
      <input type="url" id="videoUrl" placeholder="https://youtube.com/watch?v=... or any video URL">
      <button class="btn" id="dlBtn" onclick="downloadVideo()">📥 Fetch Download Links</button>
      <div class="result-area" id="dlResult"></div>
    </div>
  </div>

  <script>
    function getPlatformInfo(url) {
      if (url.includes('youtube.com') || url.includes('youtu.be')) {
        return { name: 'YouTube', class: 'platform-youtube', icon: '🎬' };
      } else if (url.includes('tiktok.com')) {
        return { name: 'TikTok', class: 'platform-tiktok', icon: '🎵' };
      } else if (url.includes('facebook.com') || url.includes('fb.watch')) {
        return { name: 'Facebook', class: 'platform-facebook', icon: '👥' };
      } else if (url.includes('instagram.com')) {
        return { name: 'Instagram', class: 'platform-instagram', icon: '📷' };
      }
      return { name: 'Video', class: 'platform-generic', icon: '🎬' };
    }

    async function downloadVideo() {      const url = document.getElementById('videoUrl').value.trim();
      if (!url) return alert('Please enter a video URL');
      if (!url.startsWith('http')) return alert('Please enter a valid URL starting with http:// or https://');

      const btn = document.getElementById('dlBtn');
      const res = document.getElementById('dlResult');
      const platform = getPlatformInfo(url);

      btn.disabled = true;
      btn.textContent = 'Fetching...';
      res.style.display = 'block';
      res.innerHTML = '<div class="loading"></div><p style="text-align:center;color:var(--text-muted);">Processing video...</p>';

      try {
        let data = null;
        
        // Method 1: Direct API call
        try {
          const response = await fetch(`https://ahm7xmakki.com/api/alldl?url=${encodeURIComponent(url)}`);
          if (response.ok) {
            data = await response.json();
          }
        } catch (e) {
          console.log('Direct API failed, trying proxy...');
        }
        
        // Method 2: Using CORS proxy
        if (!data) {
          try {
            const proxyUrl = 'https://corsproxy.io/?';
            const targetUrl = `https://ahm7xmakki.com/api/alldl?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
            if (response.ok) {
              data = await response.json();
            }
          } catch (e) {
            console.log('Proxy failed');
          }
        }

        if (data && data.links && data.links.length > 0) {
          // Build video info card
          let html = `
            <div class="video-info">
              <div style="text-align:center;">
                <span class="platform-badge ${platform.class}">
                  ${platform.icon} ${platform.name}
                </span>
              </div>
              <div class="video-title">${data.title || 'Video'}</div>              <div class="video-meta">
                <div class="meta-item">📁 ${data.links.length} formats available</div>
                ${data.duration ? `<div class="meta-item">⏱️ ${data.duration}</div>` : ''}
                ${data.author ? `<div class="meta-item">👤 ${data.author}</div>` : ''}
              </div>
            </div>
            
            <div class="download-section">
              <h3>📹 Video Downloads</h3>
              <div class="download-grid">
          `;

          // Add video formats
          const videoLinks = data.links.filter(l => !l.quality?.toLowerCase().includes('mp3') && !l.quality?.toLowerCase().includes('audio'));
          videoLinks.forEach(link => {
            const quality = link.quality || 'HD';
            const size = link.size || '';
            const downloadUrl = link.url || link.download;
            
            if (downloadUrl) {
              html += `
                <div class="download-option">
                  <div class="download-info">
                    <div class="download-quality">${quality}</div>
                    ${size ? `<div class="download-format">${size}</div>` : ''}
                  </div>
                  <a href="${downloadUrl}" target="_blank" class="btn-download">⬇ Download</a>
                </div>
              `;
            }
          });

          html += `</div></div>`;

          // Add audio formats if available
          const audioLinks = data.links.filter(l => l.quality?.toLowerCase().includes('mp3') || l.quality?.toLowerCase().includes('audio'));
          if (audioLinks.length > 0) {
            html += `
              <div class="download-section">
                <h3>🎵 Audio Downloads (MP3)</h3>
                <div class="download-grid">
            `;

            audioLinks.forEach(link => {
              const quality = link.quality || 'Audio';
              const size = link.size || '';
              const downloadUrl = link.url || link.download;
              
              if (downloadUrl) {
                html += `                  <div class="download-option">
                    <div class="download-info">
                      <div class="download-quality">${quality}</div>
                      ${size ? `<div class="download-format">${size}</div>` : ''}
                    </div>
                    <a href="${downloadUrl}" target="_blank" class="btn-download btn-audio">⬇ Download MP3</a>
                  </div>
                `;
              }
            });

            html += `</div></div>`;
          }

          res.innerHTML = html;
        } else if (data && data.error) {
          res.innerHTML = `<p style="color:var(--error);">⚠️ ${data.error}</p>`;
        } else {
          res.innerHTML = `<p style="color:var(--error);">⚠️ Could not fetch video. The video may be private or unsupported.</p>`;
        }

      } catch (error) {
        res.innerHTML = `<p style="color:var(--error);">⚠️ Failed to process video. Please check the URL and try again.</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '📥 Fetch Download Links';
      }
    }
  </script>

</body>
</html>
