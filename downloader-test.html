<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolVerse - Video Downloader Test</title>
  <style>
    :root {
      --bg-main: #0a0a0a;
      --bg-card: #111111;
      --bg-input: #1a1a1a;
      --primary: #8b5cf6;
      --accent: #FFD700;
      --text-main: #ffffff;
      --text-muted: #888888;
      --border: #222222;
      --success: #10b981;
      --error: #ef4444;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    
    body {
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 800px; margin: 0 auto; }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
    }
    
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header p { color: var(--text-muted); font-size: 1.1rem; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 20px;
      color: var(--primary);
    }

    input {
      width: 100%;
      padding: 15px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 16px;
      margin-bottom: 15px;
      outline: none;
    }
    
    input:focus { border-color: var(--primary); }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #6d28d9);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .result-area {
      margin-top: 20px;
      padding: 20px;
      background: var(--bg-input);
      border-left: 4px solid var(--primary);
      border-radius: 10px;
      display: none;
    }

    .btn-download {
      display: inline-block;
      padding: 12px 25px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      margin: 5px;
      cursor: pointer;
      border: none;
    }
    
    .btn-download:hover { background: #6d28d9; }

    .loading {
      border: 3px solid var(--border);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .back-link {
      display: inline-block;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 20px;
      cursor: pointer;
    }
    
    .back-link:hover { color: var(--primary); }
    .download-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px;
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .download-item .quality {
      color: var(--accent);
      font-weight: bold;
      font-size: 0.95rem;
    }

    .download-item .size {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <a class="back-link" onclick="window.history.back()">← Back</a>
    
    <div class="header">
      <h1>📥 Video Downloader</h1>
      <p>Download videos from any platform instantly</p>
    </div>

    <div class="card">
      <div class="section-title">🔗 Paste Video URL</div>
      <input type="url" id="videoUrl" placeholder="https://youtube.com/watch?v=... or any video URL">
      <button class="btn" id="dlBtn" onclick="downloadVideo()">📥 Fetch Download Links</button>
      <div class="result-area" id="dlResult"></div>
    </div>
  </div>

  <script>
    async function downloadVideo() {
      const url = document.getElementById('videoUrl').value.trim();
      if (!url) return alert('Please enter a video URL');
      if (!url.startsWith('http')) return alert('Please enter a valid URL starting with http:// or https://');

      const btn = document.getElementById('dlBtn');      const res = document.getElementById('dlResult');

      btn.disabled = true;
      btn.textContent = 'Fetching...';
      res.style.display = 'block';
      res.innerHTML = '<div class="loading"></div><p style="text-align:center;color:var(--text-muted);">Processing video...</p>';

      try {
        // Try multiple methods to fetch from ahm7xmakki API
        
        let data = null;
        
        // Method 1: Direct API call
        try {
          const response = await fetch(`https://ahm7xmakki.com/api/alldl?url=${encodeURIComponent(url)}`);
          if (response.ok) {
            data = await response.json();
          }
        } catch (e) {
          console.log('Direct API failed, trying proxy...');
        }
        
        // Method 2: Using CORS proxy
        if (!data) {
          try {
            const proxyUrl = 'https://corsproxy.io/?';
            const targetUrl = `https://ahm7xmakki.com/api/alldl?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
            if (response.ok) {
              data = await response.json();
            }
          } catch (e) {
            console.log('Proxy 1 failed, trying another...');
          }
        }
        
        // Method 3: Using allorigins proxy
        if (!data) {
          try {
            const proxyUrl = 'https://api.allorigins.win/raw?url=';
            const targetUrl = `https://ahm7xmakki.com/api/alldl?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
            if (response.ok) {
              const text = await response.text();
              data = JSON.parse(text);
            }
          } catch (e) {
            console.log('Proxy 2 failed');
          }
        }
        // Display results
        if (data && data.links && data.links.length > 0) {
          let html = '<h3 style="color:var(--success);margin-bottom:15px;">✅ Download Ready</h3>';
          
          data.links.forEach(link => {
            const quality = link.quality || 'Video';
            const size = link.size || '';
            const downloadUrl = link.url || link.download;
            
            if (downloadUrl) {
              html += `
                <div class="download-item">
                  <div>
                    <div class="quality">${quality}</div>
                    ${size ? `<div class="size">${size}</div>` : ''}
                  </div>
                  <a href="${downloadUrl}" target="_blank" class="btn-download">⬇ Download</a>
                </div>`;
            }
          });
          
          res.innerHTML = html;
        } else if (data && data.error) {
          res.innerHTML = `<p style="color:var(--error);">⚠️ ${data.error}</p>`;
        } else {
          res.innerHTML = `<p style="color:var(--error);">⚠️ Could not fetch video. The video may be private or unsupported.</p>`;
        }

      } catch (error) {
        res.innerHTML = `<p style="color:var(--error);">⚠️ Failed to process video. Please check the URL and try again.</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '📥 Fetch Download Links';
      }
    }
  </script>

</body>
</html>
