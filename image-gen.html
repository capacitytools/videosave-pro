<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Generator - ToolVerse</title>
  <style>
    :root { --bg-main: #0a0a0a; --bg-card: #111111; --bg-input: #1a1a1a; --primary: #8b5cf6; --text-main: #ffffff; --text-muted: #888888; --border: #222222; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: var(--bg-main); color: var(--text-main); min-height: 100vh; }
    nav { background: var(--bg-card); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
    .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); text-decoration: none; }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
    .header p { color: var(--text-muted); }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
    .section-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; color: var(--primary); }
    textarea, input, select { width: 100%; padding: 15px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; color: var(--text-main); font-size: 16px; margin-bottom: 15px; }
    textarea { min-height: 120px; resize: vertical; }
    .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), #6d28d9); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-area { margin-top: 20px; text-align: center; }
    .result-area img { max-width: 100%; border-radius: 10px; margin: 15px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .back-link { display: inline-block; color: var(--text-muted); text-decoration: none; margin-bottom: 20px; }
    .back-link:hover { color: var(--primary); }
    .size-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 15px 0; }
    .size-option { padding: 12px; background: var(--bg-input); border: 2px solid var(--border); border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.3s; }
    .size-option:hover, .size-option.active { border-color: var(--primary); background: rgba(139, 92, 246, 0.1); }
    @media (max-width: 768px) { .header h1 { font-size: 1.8rem; } .card { padding: 20px; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">← ToolVerse</a>
    <div style="color: var(--primary); font-weight: bold;">AI Image Generator</div>
  </nav>

  <div class="container">
    <a href="index.html" class="back-link">← Back to Home</a>
    <div class="header">
      <h1>🎨 AI Image Generator</h1>
      <p>Create stunning images from text descriptions</p>
    </div>

    <div class="card">
      <div class="section-title">Describe Your Image</div>
      <textarea id="imgPrompt" placeholder="Describe the image you want to generate...&#10;&#10;Example: A futuristic city at sunset with flying cars, cyberpunk style, highly detailed, 8k quality"></textarea>
            <div class="section-title" style="margin-top: 25px;">Aspect Ratio</div>
      <div class="size-grid">
        <div class="size-option active" onclick="selectSize(1024, 1024, this)">1:1 Square</div>
        <div class="size-option" onclick="selectSize(1080, 1350, this)">4:5 Portrait</div>
        <div class="size-option" onclick="selectSize(1080, 1920, this)">9:16 Story</div>
        <div class="size-option" onclick="selectSize(1280, 720, this)">16:9 Landscape</div>
      </div>

      <input type="hidden" id="imgWidth" value="1024">
      <input type="hidden" id="imgHeight" value="1024">

      <button class="btn" id="imgBtn" onclick="generateImage()">🎨 Generate Image</button>

      <div class="result-area" id="imagePreview">
        <div id="loadingSpinner" style="display: none;">
          <div style="border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto;"></div>
          <p style="color: var(--text-muted);">Generating masterpiece...</p>
        </div>
        <img id="generatedImage" style="display: none;">
        <div id="imgActions" style="display: none; margin-top: 20px;">
          <h3 style="color: var(--primary); margin-bottom: 15px;">✅ Image Generated!</h3>
          <a id="downloadImgBtn" class="btn" href="#" download="ai-image.png" style="display: inline-block; text-decoration: none; margin: 5px;">⬇ Download PNG</a>
          <a id="openImgBtn" class="btn" href="#" target="_blank" style="display: inline-block; text-decoration: none; margin: 5px; background: var(--bg-input);">🔍 Open Full Size</a>
        </div>
      </div>
    </div>
  </div>

  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script>
    function selectSize(w, h, btn) {
      document.getElementById('imgWidth').value = w;
      document.getElementById('imgHeight').value = h;
      document.querySelectorAll('.size-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function generateImage() {
      const prompt = document.getElementById('imgPrompt').value.trim();
      const w = document.getElementById('imgWidth').value;
      const h = document.getElementById('imgHeight').value;
      const btn = document.getElementById('imgBtn');
      const preview = document.getElementById('imagePreview');
      const spinner = document.getElementById('loadingSpinner');
      const img = document.getElementById('generatedImage');
      const actions = document.getElementById('imgActions');
      if (!prompt) return alert('Please describe the image!');

      btn.disabled = true;
      btn.textContent = 'Generating...';
      preview.style.display = 'block';
      spinner.style.display = 'block';
      img.style.display = 'none';
      actions.style.display = 'none';

      try {
        const seed = Math.floor(Math.random() * 10000);
        const encodedPrompt = encodeURIComponent(prompt + ', highly detailed, professional quality, 8k, masterpiece');
        const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${w}&height=${h}&model=flux&seed=${seed}&nologo=true`;

        const tempImg = new Image();
        tempImg.onload = function() {
          spinner.style.display = 'none';
          img.src = imageUrl;
          img.style.display = 'block';
          actions.style.display = 'block';
          document.getElementById('downloadImgBtn').href = imageUrl;
          document.getElementById('openImgBtn').href = imageUrl;
          btn.disabled = false;
          btn.textContent = '🎨 Generate Image';
        };
        tempImg.onerror = function() { throw new Error('Failed to load image'); };
        tempImg.src = imageUrl;

      } catch (error) {
        alert('Error generating image: ' + error.message);
        spinner.style.display = 'none';
        btn.disabled = false;
        btn.textContent = '🎨 Generate Image';
      }
    }
  </script>
</body>
</html>
