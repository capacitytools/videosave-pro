<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolVerse</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#0a0a0f;color:#fff;padding:20px;}
.card{background:#1a1a26;border:1px solid #2a2a3d;border-radius:10px;padding:20px;max-width:600px;margin:20px auto;}
textarea,input,select{width:100%;background:#13131a;border:1px solid #2a2a3d;border-radius:8px;padding:10px;color:#fff;margin-bottom:10px;}
textarea{min-height:100px;}
button{width:100%;background:#ef4444;color:#fff;border:none;border-radius:8px;padding:12px;font-size:16px;cursor:pointer;margin-top:10px;}
.result{max-width:600px;margin:20px auto;padding:20px;background:#1a1a26;border-radius:10px;}
.back{color:#7878a0;cursor:pointer;display:inline-block;margin-bottom:10px;}
</style>
</head>
<body>

<div style="text-align:center;">
<h1>ToolVerse</h1>
<button onclick="showTTS()" style="width:200px;margin:5px;">🎙️ Speechster</button>
<button onclick="showEbook()" style="width:200px;margin:5px;">📖 Ebook PDF</button>
</div>

<div id="tts" style="display:none;">
<span class="back" onclick="home()">← Back</span>
<div class="card">
<h2>Text to Speech</h2>
<textarea id="text" placeholder="Type text..."></textarea>
<select id="voice">
<option value="Brian">Brian (UK Male)</option>
<option value="Amy">Amy (UK Female)</option>
<option value="Matthew">Matthew (US Male)</option>
<option value="Joanna">Joanna (US Female)</option>
</select>
<button onclick="genSpeech()">Generate Audio</button>
</div>
<div id="ttsResult"></div>
</div>

<div id="ebook" style="display:none;">
<span class="back" onclick="home()">← Back</span>
<div class="card">
<h2>Ebook to PDF</h2>
<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author">
<textarea id="content" placeholder="Paste content..." style="min-height:200px;"></textarea>
<button onclick="genPDF()">Download PDF</button>
</div>
<div id="pdfResult"></div>
</div>

<script>
function home(){document.getElementById('tts').style.display='none';document.getElementById('ebook').style.display='none';}
function showTTS(){document.getElementById('tts').style.display='block';document.getElementById('ebook').style.display='none';}
function showEbook(){document.getElementById('ebook').style.display='block';document.getElementById('tts').style.display='none';}

function genSpeech(){
var text=document.getElementById('text').value;
var voice=document.getElementById('voice').value;
var result=document.getElementById('ttsResult');
if(!text){alert('Type something!');return;}
var url='https://api.ttsmp3.com/makemp3_new?voice='+voice+'&text='+encodeURIComponent(text)+'&source=aws_polly';
result.innerHTML='<div class="result"><h3>Audio Ready</h3><audio controls src="'+url+'" style="width:100%;"></audio><br><a href="'+url+'" download="speech.mp3" style="color:#22d3a5;">⬇ Download MP3</a></div>';
}

function genPDF(){
var title=document.getElementById('title').value||'My Book';
var author=document.getElementById('author').value||'Unknown';
var content=document.getElementById('content').value;
var result=document.getElementById('pdfResult');
if(!content){alert('Paste some content!');return;}
try{
var doc=new window.jspdf.jsPDF();
doc.setFontSize(20);
doc.text(title,105,20,{align:'center'});
doc.setFontSize(14);
doc.text('by '+author,105,30,{align:'center'});
doc.setFontSize(12);
var lines=doc.splitTextToSize(content,180);
doc.text(lines,15,45);
doc.save(title+'.pdf');
result.innerHTML='<div class="result" style="color:#22d3a5;">✅ PDF Downloaded!</div>';
}catch(err){
result.innerHTML='<div class="result" style="color:#f87171;">⚠ '+err.message+'</div>';
}
}
</script>

</body>
</html>
